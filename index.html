    <!-- theme switch logic -->
    <script>
        var theme;
        if (localStorage.getItem("theme")) {
            theme = localStorage.getItem("theme");
        }
        else
            theme = (window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        setTheme(theme)

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
        if (event.matches)
            setTheme("dark");
        else
            setTheme("light");
        })
        
        function setTheme(theme) {
            localStorage.setItem("theme", theme);
            document.documentElement.setAttribute("data-theme", theme);
            // Keep the browser/PWA chrome (status bar, address bar) matching the
            // theme's background ‚ÄĒ dark #1c1a17 / light #f0e7d6 (= --background-one).
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute("content", theme === "dark" ? "#1c1a17" : "#f0e7d6");
        }

        function toggleTheme() {
            var newTheme = document.documentElement.getAttribute("data-theme") == "dark" ? "light" : "dark";
            console.log("Activating ".concat(newTheme.concat(" mode...")));
            setTheme(newTheme);
        }
        window.toggleTheme = toggleTheme;
    </script>

    <script>
        // Skip the service worker on localhost ‚ÄĒ a SW intercepting vite dev
        // paths (HMR, /src/, /@vite/) can serve a stale response after any
        // dev hiccup and produce a blank-page state that's painful to debug.
        // Existing localhost SW registrations are unregistered defensively.
        if ('serviceWorker' in navigator) {
            const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            if (isLocal) {
                navigator.serviceWorker.getRegistrations().then((regs) => {
                    regs.forEach((r) => r.unregister());
                });
            } else {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('/sw.js').catch(() => {});
                });
            }
        }
    </script>
