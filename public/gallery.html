<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <title>Gallery | MaxEisen.me</title>
    <meta charset="UTF-8">
    <meta name="author" content="Max Eisen">
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <meta name="theme-color" content="#1c1a17"/>
    <link rel="canonical" href="https://maxeisen.me/gallery"/>
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/styles/global.css">
    <style>
        @font-face {
            font-family: "Inter";
            font-style: normal;
            font-weight: 300 700;
            font-display: swap;
            src: url(/fonts/inter-latin.woff2) format("woff2");
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }
        @font-face {
            font-family: "Fraunces";
            font-style: normal;
            font-weight: 500 700;
            font-display: swap;
            src: url(/fonts/fraunces-latin.woff2) format("woff2");
            unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
        }

        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.4;
            color: var(--paragraph-colour);
            background-color: var(--background-one);
            background-image:
                radial-gradient(circle at 50% 50%, var(--background-glow) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, var(--background-accent) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, var(--background-two) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, var(--background-two) 0%, transparent 60%);
            background-size: 180% 180%, 200% 200%, 220% 220%, 270% 270%;
            background-repeat: no-repeat;
            background-attachment: fixed;
            animation: drift 25s ease-in-out infinite;
            min-height: 100vh;
        }

        @keyframes drift {
            0%   { background-position: 25% 75%, 80% 20%, 18% 28%, 82% 72%; }
            16%  { background-position: 70% 60%, 30% 40%, 55% 48%, 35% 82%; }
            33%  { background-position: 45% 25%, 60% 80%, 78% 75%, 48% 22%; }
            50%  { background-position: 80% 40%, 20% 65%, 38% 62%, 82% 38%; }
            66%  { background-position: 30% 70%, 75% 30%, 68% 22%, 15% 72%; }
            83%  { background-position: 65% 20%, 35% 75%, 22% 70%, 72% 45%; }
            100% { background-position: 25% 75%, 80% 20%, 18% 28%, 82% 72%; }
        }
        @media (prefers-reduced-motion: reduce) { body { animation: none; } }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 3rem 1.5rem 4rem;
        }

        header.gallery-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 2.5rem;
            gap: 1rem;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-optical-sizing: auto;
            font-size: clamp(2rem, 4vw, 3.5rem);
            letter-spacing: -0.03em;
            margin: 0;
            color: var(--header-colour);
        }

        .gallery-meta {
            font-size: 0.85rem;
            color: var(--paragraph-colour);
            opacity: 0.65;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .home-link {
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--main-green);
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }
        .home-link:hover { opacity: 1; }

        .gallery {
            column-count: 4;
            column-gap: 1rem;
        }
        @media (max-width: 1200px) { .gallery { column-count: 3; } }
        @media (max-width: 800px)  { .gallery { column-count: 2; } }
        @media (max-width: 480px)  { .gallery { column-count: 1; } }

        .gallery figure {
            margin: 0 0 1rem 0;
            break-inside: avoid;
            border-radius: 12px;
            overflow: hidden;
            background: var(--main-green-translucent);
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }
        .gallery figure:hover { transform: translateY(-2px); }
        .gallery img {
            display: block;
            width: 100%;
            height: auto;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .gallery img.loaded { opacity: 1; }

        .gallery figcaption {
            font-size: 0.78rem;
            color: var(--paragraph-colour);
            opacity: 0.7;
            padding: 0.55rem 0.5rem 0.25rem;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .empty-state, .error-state {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--paragraph-colour);
            opacity: 0.6;
            font-size: 1rem;
        }

        /* lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            z-index: 100;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }
        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 12px 60px rgba(0, 0, 0, 0.6);
        }
        .lightbox-close {
            position: absolute;
            top: 1rem;
            right: 1.25rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            line-height: 1;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }
        .lightbox-close:hover { opacity: 1; }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 2rem;
            line-height: 1;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s ease, background 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-bottom: 2px;
        }
        .lightbox-nav:hover { opacity: 1; background: rgba(0, 0, 0, 0.7); }
        .lightbox-prev { left: 1.25rem; }
        .lightbox-next { right: 1.25rem; }
        @media (max-width: 600px) {
            .lightbox-nav { width: 2.5rem; height: 2.5rem; font-size: 1.6rem; }
            .lightbox-prev { left: 0.5rem; }
            .lightbox-next { right: 0.5rem; }
        }

        .lightbox-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 255, 255, 0.18);
            border-top-color: var(--main-green);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.18s ease;
            pointer-events: none;
            z-index: 1;
        }
        .lightbox-spinner.visible { opacity: 1; animation: lightbox-spin 0.8s linear infinite; }
        @keyframes lightbox-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }
        @media (prefers-reduced-motion: reduce) {
            .lightbox-spinner.visible { animation: none; }
        }

        .lightbox img {
            transition: opacity 0.2s ease;
        }
        .lightbox img:not([src]),
        .lightbox img[src=""] { opacity: 0; }

        .lightbox-caption {
            position: absolute;
            bottom: 1.25rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.92);
            font-size: 0.85rem;
            letter-spacing: 0.04em;
            background: rgba(0, 0, 0, 0.55);
            padding: 0.5rem 1rem;
            border-radius: 999px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            max-width: calc(100% - 4rem);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
        }
        .lightbox-caption[hidden] { display: none; }
    </style>
</head>
<body>
    <main class="container">
        <header class="gallery-header">
            <h1>Gallery</h1>
            <div style="display: flex; align-items: baseline; gap: 1.5rem;">
                <div class="gallery-meta" id="gallery-meta">— photos</div>
                <a class="home-link" href="/">← back</a>
            </div>
        </header>
        <div class="gallery" id="gallery">
            <div class="empty-state">Loading photos…</div>
        </div>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close">×</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Previous photo">‹</button>
        <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Next photo">›</button>
        <div class="lightbox-spinner" id="lightbox-spinner" aria-hidden="true"></div>
        <img id="lightbox-img" alt=""/>
        <div class="lightbox-caption" id="lightbox-caption" hidden></div>
    </div>

    <script>
        // === theme: respect localStorage from main site ===
        (function applyTheme() {
            const saved = localStorage.getItem('theme');
            const theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();

        // === back link: prefer history.back() when arriving from the same origin ===
        document.querySelector('.home-link')?.addEventListener('click', (e) => {
            try {
                const fromSameOrigin = document.referrer && new URL(document.referrer).origin === window.location.origin;
                if (fromSameOrigin && window.history.length > 1) {
                    e.preventDefault();
                    window.history.back();
                }
            } catch { /* fall through to href="/" */ }
        });

        const CLOUDINARY_CLOUD = 'decfdmwnw';
        const CLOUDINARY_TAG = 'gallery';

        function cloudinaryUrl(publicId, transforms) {
            // Omit the file extension so f_auto can negotiate WebP/AVIF based on Accept headers.
            return `https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/upload/${transforms}/${publicId}`;
        }

        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        async function fetchPhotos() {
            // Prefer the authenticated function (returns metadata like location).
            try {
                const res = await fetch('/.netlify/functions/galleryList');
                if (res.status !== 503 && res.ok) {
                    const data = await res.json();
                    return data.resources || [];
                }
            } catch (err) {
                // Network error — fall through to the public list.
            }
            // Fallback: public list (no metadata).
            const res = await fetch(`https://res.cloudinary.com/${CLOUDINARY_CLOUD}/image/list/${CLOUDINARY_TAG}.json`);
            if (!res.ok) throw new Error(`status ${res.status}`);
            const data = await res.json();
            return data.resources || [];
        }

        async function load() {
            const grid = document.getElementById('gallery');
            try {
                const photos = await fetchPhotos();
                if (photos.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No photos yet.</div>';
                    document.getElementById('gallery-meta').textContent = '0 photos';
                    return;
                }
                // Randomize order on each load (Fisher-Yates).
                for (let i = photos.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [photos[i], photos[j]] = [photos[j], photos[i]];
                }
                document.getElementById('gallery-meta').textContent =
                    `${photos.length} photo${photos.length === 1 ? '' : 's'}`;
                grid.innerHTML = photos.map((p) => {
                    const thumb = cloudinaryUrl(p.public_id, 'f_auto,q_auto,w_800');
                    const full = cloudinaryUrl(p.public_id, 'f_auto,q_auto,w_2400');
                    const ratio = p.width && p.height ? (p.height / p.width) * 100 : null;
                    const padding = ratio ? `style="padding-bottom: ${ratio.toFixed(2)}%; position: relative;"` : '';
                    const location = p.location ? escapeHtml(p.location) : '';
                    return `
                        <figure data-full="${full}" data-location="${location}">
                            <div ${padding}>
                                <img src="${thumb}" alt="${location}" loading="lazy"
                                    style="${ratio ? 'position: absolute; inset: 0;' : ''}"
                                    onload="this.classList.add('loaded')"/>
                            </div>
                            ${location ? `<figcaption>${location}</figcaption>` : ''}
                        </figure>
                    `;
                }).join('');

                // Lightbox wiring
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                const closeBtn = document.getElementById('lightbox-close');
                const prevBtn = document.getElementById('lightbox-prev');
                const nextBtn = document.getElementById('lightbox-next');

                const fullUrls = photos.map((p) => cloudinaryUrl(p.public_id, 'f_auto,q_auto,w_2400'));
                const locations = photos.map((p) => p.location || '');
                const spinner = document.getElementById('lightbox-spinner');
                const caption = document.getElementById('lightbox-caption');
                let currentIndex = -1;
                let loadToken = 0;

                const updateCaption = (idx) => {
                    const text = locations[idx];
                    if (text) {
                        caption.textContent = text;
                        caption.hidden = false;
                    } else {
                        caption.textContent = '';
                        caption.hidden = true;
                    }
                };

                const showAt = (idx, { keepCurrent = true } = {}) => {
                    if (photos.length === 0) return;
                    currentIndex = (idx + photos.length) % photos.length;
                    const url = fullUrls[currentIndex];
                    const myToken = ++loadToken;

                    if (!keepCurrent) {
                        // First open — clear any stale src so the empty frame doesn't flash.
                        lightboxImg.removeAttribute('src');
                    }
                    spinner.classList.add('visible');
                    updateCaption(currentIndex);

                    const preload = new Image();
                    preload.onload = () => {
                        if (myToken !== loadToken) return; // a newer navigation superseded this one
                        lightboxImg.src = url;
                        spinner.classList.remove('visible');
                    };
                    preload.onerror = () => {
                        if (myToken !== loadToken) return;
                        spinner.classList.remove('visible');
                    };
                    preload.src = url;
                };
                const open = (idx) => {
                    showAt(idx, { keepCurrent: false });
                    lightbox.classList.add('open');
                    document.body.style.overflow = 'hidden';
                };
                const close = () => {
                    lightbox.classList.remove('open');
                    lightboxImg.removeAttribute('src');
                    spinner.classList.remove('visible');
                    caption.hidden = true;
                    document.body.style.overflow = '';
                    currentIndex = -1;
                    loadToken++; // invalidate any in-flight loads
                };
                const next = () => showAt(currentIndex + 1);
                const prev = () => showAt(currentIndex - 1);

                grid.addEventListener('click', (e) => {
                    const fig = e.target.closest('figure');
                    if (!fig) return;
                    const idx = Array.prototype.indexOf.call(grid.children, fig);
                    if (idx >= 0) open(idx);
                });

                lightbox.addEventListener('click', (e) => {
                    // Click-out closes only if user clicked the dim background, not the image or buttons.
                    if (e.target === lightbox) close();
                });
                closeBtn.addEventListener('click', close);
                prevBtn.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
                nextBtn.addEventListener('click', (e) => { e.stopPropagation(); next(); });

                document.addEventListener('keydown', (e) => {
                    if (!lightbox.classList.contains('open')) return;
                    if (e.key === 'Escape') close();
                    else if (e.key === 'ArrowRight') next();
                    else if (e.key === 'ArrowLeft') prev();
                });

                // Swipe support on touch devices.
                let touchStartX = null;
                lightbox.addEventListener('touchstart', (e) => {
                    if (e.touches.length === 1) touchStartX = e.touches[0].clientX;
                }, { passive: true });
                lightbox.addEventListener('touchend', (e) => {
                    if (touchStartX == null) return;
                    const dx = (e.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;
                    if (Math.abs(dx) > 50) (dx < 0 ? next : prev)();
                    touchStartX = null;
                });
            } catch (err) {
                console.error(err);
                grid.innerHTML = '<div class="error-state">Couldn\'t load photos right now.</div>';
            }
        }

        load();
    </script>
</body>
</html>
