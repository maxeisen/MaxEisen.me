[build]
  # Tests first: a failing test fails the build, so Netlify keeps the previous
  # deploy live and the regression never reaches production. (`&&` short-circuits
  # before the slower manifest generation.)
  command = "npm run test:run && node scripts/build-gallery-manifest.mjs && node scripts/seed-bach-party-packs.mjs && npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Bundle the precomputed gallery manifests with the functions so
# signedGalleryList can read them instead of running a ~20s Admin search per
# load. Generated at build time (see scripts/build-gallery-manifest.mjs).
[functions]
  included_files = ["netlify/functions/_generated/**"]

# /build/* is content-hashed (see vite.config.js) — every filename changes
# when its contents change, so these are safe to cache forever. immutable +
# 1-year max-age means Cloudflare and browsers never revalidate them against
# the origin, which keeps Netlify from getting hammered (and rate-limiting
# with 429s) when Cloudflare's edge cache is cold. HTML stays uncached so
# new deploys (which reference fresh hashed filenames) take effect instantly.
[[headers]]
  for = "/build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Story text only (~OpenAI). TTS is a separate function so we stay under Netlify's
# sync limit (10s default, 26s max on Pro). Local `netlify dev` honors these overrides.
[functions."bach-story"]
  timeout = 26

# Sync bach-story-tts is a stub; real work runs in bach-story-tts-background (202, ~15 min).
[functions."bach-story-tts"]
  timeout = 10

[functions."bach-story-tts-background"]
  timeout = 900

[functions."bach-story-images-background"]
  timeout = 900

[dev]
  command = "vite"
  targetPort = 6808
  autoLaunch = true
  # Don't fall back to `dist/` during `netlify dev` — that's the prod build
  # output and would shadow the live vite server with stale bundled code.
  # `public/` has no index.html, so the SPA rewrite below falls through to
  # the vite proxy and gets a freshly-transformed page each request.
  publish = "public"

# Bypass rules for `netlify dev` — vite serves source modules from these
# paths dynamically, and netlify dev applies the SPA catch-all below before
# proxying to vite. Without these passthroughs, /src/main.js gets rewritten
# to /index.html and the app boots blank. In production these prefixes
# don't exist (vite emits to /build/), so the rules are inert.
[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200
[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200
[[redirects]]
  from = "/@vite/*"
  to = "/@vite/:splat"
  status = 200
[[redirects]]
  from = "/@id/*"
  to = "/@id/:splat"
  status = 200
[[redirects]]
  from = "/@fs/*"
  to = "/@fs/:splat"
  status = 200

# SPA catch-all: every Svelte route (/, /gallery, /gallery/ride,
# /gallery/run, /dashboard) routes through index.html where the App.svelte
# router lazy-loads the matching route component.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200