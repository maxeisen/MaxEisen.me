[build]
  command = "node scripts/seed-bach-party-packs.mjs && npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Story text only (~OpenAI). TTS is a separate function so we stay under Netlify's
# sync limit (10s default, 26s max on Pro). Local `netlify dev` honors these overrides.
[functions."bach-story"]
  timeout = 26

# Sync bach-story-tts is a stub; real work runs in bach-story-tts-background (202, ~15 min).
[functions."bach-story-tts"]
  timeout = 10

[functions."bach-story-tts-background"]
  timeout = 900

[functions."bach-story-images-background"]
  timeout = 900

[dev]
  command = "vite"
  targetPort = 6808
  autoLaunch = true
  # Don't fall back to `dist/` during `netlify dev` — that's the prod build
  # output and would shadow the live vite server with stale bundled code.
  # `public/` has no index.html, so the SPA rewrite below falls through to
  # the vite proxy and gets a freshly-transformed page each request.
  publish = "public"

# Bypass rules for `netlify dev` — vite serves source modules from these
# paths dynamically, and netlify dev applies the SPA catch-all below before
# proxying to vite. Without these passthroughs, /src/main.js gets rewritten
# to /index.html and the app boots blank. In production these prefixes
# don't exist (vite emits to /build/), so the rules are inert.
[[redirects]]
  from = "/src/*"
  to = "/src/:splat"
  status = 200
[[redirects]]
  from = "/node_modules/*"
  to = "/node_modules/:splat"
  status = 200
[[redirects]]
  from = "/@vite/*"
  to = "/@vite/:splat"
  status = 200
[[redirects]]
  from = "/@id/*"
  to = "/@id/:splat"
  status = 200
[[redirects]]
  from = "/@fs/*"
  to = "/@fs/:splat"
  status = 200

# SPA catch-all: every Svelte route (/, /gallery, /gallery/ride,
# /gallery/run, /dashboard) routes through index.html where the App.svelte
# router lazy-loads the matching route component.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200