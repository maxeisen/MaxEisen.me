[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "vite"
  targetPort = 6808
  autoLaunch = true

# /gallery, /gallery/ride, /gallery/run are now Svelte routes inside the
# SPA — the catch-all below routes them through index.html, where the
# App.svelte router lazy-loads the matching route component.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200